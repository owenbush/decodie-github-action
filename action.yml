name: 'Decodie Analyze'
description: 'Automatically analyze changed files in PRs and generate Decodie learning entries'
author: 'owenbush'
branding:
  icon: 'book-open'
  color: 'blue'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key (provide this or claude-code-oauth-token)'
    required: false
    default: ''
  claude-code-oauth-token:
    description: 'Claude Code OAuth token (provide this or anthropic-api-key)'
    required: false
    default: ''
  mode:
    description: 'Analysis mode: selective or exhaustive'
    required: false
    default: 'selective'
  model:
    description: 'Claude model to use'
    required: false
    default: 'claude-sonnet-4-6'
  max-files:
    description: 'Maximum number of changed files to analyze (0 for no limit)'
    required: false
    default: '10'
  include:
    description: 'Comma-separated glob patterns for files to include'
    required: false
    default: ''
  exclude:
    description: 'Comma-separated glob patterns for files to exclude'
    required: false
    default: ''
  github-token:
    description: 'GitHub token with repo and pull request permissions'
    required: false
    default: '${{ github.token }}'

runs:
  using: 'composite'
  steps:
    - name: Validate auth
      shell: bash
      run: |
        if [ -z "${{ inputs.anthropic-api-key }}" ] && [ -z "${{ inputs.claude-code-oauth-token }}" ]; then
          echo "::error::Either anthropic-api-key or claude-code-oauth-token must be provided"
          exit 1
        fi

    - name: Install Decodie skill
      shell: bash
      run: npx @owenbush/decodie-ui install-skill

    - name: Run Decodie analysis
      uses: anthropics/claude-code-action@v1
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key }}
        claude_code_oauth_token: ${{ inputs.claude-code-oauth-token }}
        github_token: ${{ inputs.github-token }}
        claude_args: '--model ${{ inputs.model }}'
        use_sticky_comment: 'true'
        settings: |
          {
            "permissions": {
              "allow": [
                "Bash(git diff:*)",
                "Bash(git add:*)",
                "Bash(git commit:*)",
                "Bash(git push:*)",
                "Bash(git log:*)",
                "Bash(git status:*)",
                "Bash(gh pr comment:*)",
                "Bash(ls:*)",
                "Bash(cat:*)",
                "Bash(find:*)",
                "Bash(mkdir:*)",
                "Bash(echo:*)",
                "Bash(shasum:*)",
                "Read",
                "Write",
                "Edit",
                "Glob",
                "Grep"
              ]
            }
          }
        prompt: |
          You have the Decodie skill installed. Use /decodie:analyze to analyze the files changed in this pull request.

          Configuration:
          - Mode: ${{ inputs.mode }}
          - Max files: ${{ inputs.max-files }}
          - Include patterns: ${{ inputs.include }}
          - Exclude patterns: ${{ inputs.exclude }}

          Instructions:
          1. First, identify the files changed in this PR using git diff.
          2. Filter the file list:
             - Only include added or modified files (skip deleted files).
             - Skip binary files, lock files (package-lock.json, yarn.lock, etc.), and generated files.
             - If include patterns are specified, only analyze files matching those patterns.
             - If exclude patterns are specified, skip files matching those patterns.
             - If max files is greater than 0, limit to that many files (prioritize the largest/most complex).
          3. Run /decodie:analyze on each file (or directory if there are many files in the same directory).
             - Use the ${{ inputs.mode }} mode (selective = 3-5 patterns per file, exhaustive = all patterns).
          4. After analysis is complete, use `gh pr comment` to post a summary comment on this PR. Format the comment body as markdown with:
             - A header: "## 📖 Decodie Analysis"
             - Total number of entries generated across all files.
             - For each analyzed file, a collapsible <details> section containing the entries for that file.
             - Each entry should show: title, experience level, decision type, code snippet, explanation, and key concepts.
             - A footer linking to https://decodie.owenbush.dev
             Use: gh pr comment ${{ github.event.pull_request.number }} --body "YOUR_MARKDOWN_HERE"

          5. The entries have already been written to .decodie/ by the skill. Commit and push the .decodie/ changes to this PR branch with the message "docs(decodie): auto-generated entries from PR analysis".
